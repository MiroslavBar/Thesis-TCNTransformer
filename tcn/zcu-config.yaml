# EEG Classification Model Configuration

# Data Paths
data:
  data_file_binary: "C:/FAV/FAV/3.rocnik/bakalarka/Thienuv_navrh/preprocessed_data_zcu_dataset/data_time_series_binary.npy"
  labels_file_binary: "C:/FAV/FAV/3.rocnik/bakalarka/Thienuv_navrh/preprocessed_data_zcu_dataset/labels_time_series_binary.npy"
  data_file_multiclass: "C:/FAV/FAV/3.rocnik/bakalarka/Thienuv_navrh/preprocessed_data_zcu_dataset/data_time_series_multiclass.npy"
  labels_file_multiclass: "C:/FAV/FAV/3.rocnik/bakalarka/Thienuv_navrh/preprocessed_data_zcu_dataset/labels_time_series_multiclass.npy"
  test_size: 0.2
  validation_size: 0.1

# Network Architecture Parameters
network_args:
  num_classes: 3  # 2 for binary, 3 for multiclass

# Model Architecture
model:
  # TCN (Temporal Convolutional Network) Parameters
  tcn:
    num_filters: 64
    kernel_size: 3
    dilations: [1, 2, 4, 8]
    num_stacks: 1
    use_skip_connections: True
    dropout_rate: 0.2
    activation: 'relu'

  # Transformer Encoder Parameters
  transformer:
    num_heads: 4
    key_dim: 64
    dropout_rate: 0.2

# Training Hyperparameters
training:
  batch_size: 32
  epochs: 100
  learning_rate: 0.001
  early_stopping_patience: 40
  reduce_lr_patience: 7
  min_learning_rate: 0.0001

# GPU Configuration
gpu:
  enable: True
  memory_growth: True
  mixed_precision: True

# Logging
logging:
  model_path: "zcu_tcn_transformer_model.h5"
  training_history_plot: "zcu_tcn_transformer_training_history.png"
  confusion_matrix_plot: "zcu_tcn_transformer_confusion_matrix.png"